name: 选手信息爬虫

on:
  schedule:
    - cron: '0 5 1 * *'   # 每月 1 日凌晨 5 点
  workflow_dispatch:

jobs:
  players:
    name: 爬取选手信息
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 安装系统依赖（Puppeteer + Chromium）
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates fonts-liberation \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdrm2 libgbm1 libnss3 libxcomposite1 libxdamage1 \
            libxrandr2 xdg-utils chromium-browser

      - name: 安装依赖（跳过 Chromium 下载，用系统已安装的）
        run: npm install
        working-directory: crawler
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: 快速增量更新选手信息
        run: node player_data.js --images-only
        working-directory: crawler
        env:
          NODE_ENV: production
