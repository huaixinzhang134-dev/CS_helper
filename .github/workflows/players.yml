name: 选手信息爬虫

on:
  schedule:
    - cron: '28 3 1 * *'   # 每月 1 日 3:28
  workflow_dispatch:

jobs:
  players:
    name: 爬取选手信息（分片 ${{ matrix.chunk }}）
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: [0, 1, 2, 3, 4, 5, 6, 7, 8]
      fail-fast: false

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 安装系统依赖（Puppeteer 运行时库）
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates fonts-liberation \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdrm2 libgbm1 libnss3 libxcomposite1 libxdamage1 \
            libxrandr2 xdg-utils

      - name: 安装 Google Chrome（非 Snap，完整版）
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get -f install -y
          rm /tmp/chrome.deb
          google-chrome --version

      - name: 安装依赖（跳过 Chromium 下载，用系统已安装的）
        run: npm install
        working-directory: crawler
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: 爬取选手信息（分片 ${{ matrix.chunk }}）
        run: node player_data.js --chunk ${{ matrix.chunk }}
        working-directory: crawler
        env:
          NODE_ENV: production

      - name: 上传分片产物
        uses: actions/upload-artifact@v4
        with:
          name: playerbase-chunk-${{ matrix.chunk }}
          path: crawler/playerbase_chunk${{ matrix.chunk }}.json
          retention-days: 1

  merge:
    name: 合并分片 + 导入数据库
    runs-on: ubuntu-latest
    needs: players

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 下载所有分片产物
        uses: actions/download-artifact@v4

      - name: 合并分片文件
        run: |
          echo '[]' > playerbase.json.tmp
          for f in playerbase-chunk-*/playerbase_chunk*.json; do
            echo "合并: $f"
            cat "$f" >> playerbase_merged.json
            echo "" >> playerbase_merged.json
          done
          # 去重（按 _id）
          node -e "
            const fs = require('fs');
            const lines = fs.readFileSync('playerbase_merged.json','utf8').split('\n').filter(l=>l.trim());
            const seen = new Set();
            const unique = [];
            for (const line of lines) {
              try {
                const p = JSON.parse(line);
                if (p._id && !seen.has(p._id)) { seen.add(p._id); unique.push(line); }
              } catch(e) {}
            }
            fs.writeFileSync('crawler/playerbase.json', unique.join('\n'), 'utf8');
            console.log('合并完成: ' + unique.length + ' 个选手');
          "

      - name: 安装 MySQL 驱动 + mysqldump
        run: |
          sudo apt-get install -y mysql-client 2>/dev/null || true
          npm install        # root package.json 仅含 mysql2

      - name: 备份当前选手数据（导入前）
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          mysqldump -h ${{ secrets.DB_HOST }} \
            -P ${{ secrets.DB_PORT }} \
            -u ${{ secrets.DB_USER }} \
            -p${{ secrets.DB_PASS }} \
            --single-transaction --quick \
            ${{ secrets.DB_NAME }} player \
            | gzip > player_backup_${TIMESTAMP}.sql.gz
          echo "✅ 备份: player_backup_${TIMESTAMP}.sql.gz ($(du -h player_backup_${TIMESTAMP}.sql.gz | cut -f1))"
        env:
          MYSQL_PWD: ${{ secrets.DB_PASS }}

      - name: 上传备份文件到产物
        uses: actions/upload-artifact@v4
        with:
          name: player-db-backup
          path: player_backup_*.sql.gz
          retention-days: 30
          if-no-files-found: warn

      - name: 覆盖导入到 Railway MySQL
        run: node scripts/import-players.js
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
