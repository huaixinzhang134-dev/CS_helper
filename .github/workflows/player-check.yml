name: 选手位置检测

on:
  # schedule: 已暂停，选手位置由 players.yml 导入时自动设定
  # - cron: '0 5 */3 * *'
  workflow_dispatch:

jobs:
  check:
    name: 检查选手位置（第 ${{ matrix.chunk }} 组）
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: [0, 1, 2, 3, 4, 5]
      fail-fast: false

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 安装系统依赖（Puppeteer 运行时库）
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates fonts-liberation \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdrm2 libgbm1 libnss3 libxcomposite1 libxdamage1 \
            libxrandr2 xdg-utils

      - name: 安装 Node 依赖（跳过 Chromium 下载）
        run: npm install
        working-directory: crawler
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: 安装 Google Chrome（非 Snap，完整版）
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get -f install -y
          rm /tmp/chrome.deb
          google-chrome --version

      - name: 检查选手位置（快速模式：仅步枪手）
        run: node player_check.js --quick --start=$((${{ matrix.chunk }} * 1000)) --limit=1000
        working-directory: crawler
        env:
          NODE_ENV: production
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
