name: 排名爬虫

on:
  schedule:
    - cron: '0 3 */7 * *'   # 每 7 天凌晨 3 点
  workflow_dispatch:

jobs:
  ranking:
    name: 爬取战队排名
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 安装系统依赖（Puppeteer 运行时库）
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates fonts-liberation \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdrm2 libgbm1 libnss3 libxcomposite1 libxdamage1 \
            libxrandr2 xdg-utils

      - name: 安装 Node 依赖（跳过 Chromium 下载）
        run: npm install
        working-directory: crawler
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: 安装 Google Chrome（非 Snap，完整版）
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get -f install -y
          rm /tmp/chrome.deb
          google-chrome --version

      - name: 全量爬取（排名 + 队伍详情 + 选手阵容）
        run: node crawl_ranking.js --full
        working-directory: crawler
        env:
          NODE_ENV: production

      - name: 导入到 Railway MySQL
        run: |
          npm install
          node import_ranking.js
        working-directory: scripts
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}

      - name: 快速检查选手位置（步枪手 → 狙击手/指挥，带轮换池）
        run: node player_check.js --quick
        working-directory: crawler
        env:
          NODE_ENV: production
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          # PROXY_LIST: ${{ secrets.PROXY_LIST }}  # 解注可用 HTTP 代理轮换（逗号分隔），每 100 次请求 + 每次超时重试自动换浏览器换代理
