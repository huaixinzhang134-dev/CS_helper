name: 赛事爬虫

on:
  schedule:
    - cron: '*/10 * * * *'   # 每 10 分钟
  workflow_dispatch:

jobs:
  crawl:
    name: 爬取赛事数据
    runs-on: ubuntu-latest

    env:
      API_BASE: https://cshelper-production.up.railway.app
      SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 安装依赖
        run: npm ci
        working-directory: server

      - name: 运行爬虫
        run: node crawler/crawler-service.js --once
        working-directory: server
        env:
          CRAWLER_DRY_RUN: false
