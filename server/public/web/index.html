<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>云雪CS助手</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Top Navigation -->
    <nav class="top-nav" id="topNav">
      <div class="nav-items" id="navItems">
        <button class="nav-item active" data-page="home">🏠 首页</button>
        <button class="nav-item" data-page="events">📅 赛事</button>
        <button class="nav-item" data-page="guess">🎯 猜一猜</button>
        <button class="nav-item" data-page="players">📋 选手库</button>
        <button class="nav-item" data-page="ranking">🏆 排行</button>
        <button class="nav-item" data-page="shop">🛒 商城</button>
        <button class="nav-item" data-page="picks">📊 TOP30</button>
      </div>
      <div class="nav-user" id="navUser" onclick="App.goTo('user')">
        <span id="navUserName">未登录</span>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <div id="pageContent"></div>
    </main>
  </div>

  <!-- Login Modal -->
  <div class="modal-mask" id="loginModal" style="display:none">
    <div class="modal-content" style="max-width:380px;position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.15;background:url('/beijing.png') center/cover no-repeat;pointer-events:none;"></div>
      <div style="position:relative;z-index:1;">
      <div class="modal-title">登录云雪CS助手</div>
      <div class="modal-body">
        <p style="margin-bottom:16px;color:var(--text-secondary);font-size:13px;text-align:center;">输入手机号登录或注册</p>
        <div class="input-group" style="margin-bottom:12px">
          <span style="padding:10px 0;color:var(--text-muted);font-size:14px">+86</span>
          <input class="input" id="loginPhone" type="tel" placeholder="请输入手机号" maxlength="11"
            oninput="this.value=this.value.replace(/\D/g,'')" style="flex:1">
        </div>
        <button class="btn btn-block" id="loginBtn" onclick="App.doLogin()">登录</button>
        <p id="loginError" style="color:var(--danger);font-size:13px;text-align:center;margin-top:8px;display:none"></p>
        <p style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-muted)">
          登录即表示同意<a href="#" onclick="return false">服务条款</a>
        </p>
      </div>
      <div class="modal-footer" style="justify-content:center">
        <button class="btn btn-ghost btn-sm" onclick="App.closeLogin()">暂不登录</button>
      </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
