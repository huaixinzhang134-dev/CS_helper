<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>云雪CS助手</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Top Navigation -->
    <nav class="top-nav" id="topNav">
      <div class="nav-items" id="navItems">
        <button class="nav-item active" data-page="home">🏠 首页</button>
        <button class="nav-item" data-page="events">📅 赛事</button>
        <button class="nav-item" data-page="guess">🎯 猜一猜</button>
        <button class="nav-item" data-page="players">📋 选手库</button>
        <button class="nav-item" data-page="ranking">🏆 排行</button>
        <button class="nav-item" data-page="shop">🛒 商城</button>
        <button class="nav-item" data-page="picks">📊 TOP30</button>
      </div>
      <div class="nav-user" id="navUser" onclick="App.goTo('user')">
        <span id="navUserName">未登录</span>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <div id="pageContent"></div>
    </main>
  </div>

  <!-- Mini Program Prompt Modal -->
  <div class="modal-mask" id="miniProgramModal" style="display:none">
    <div class="modal-content" style="max-width:320px;text-align:center;">
      <div class="modal-title">请使用微信小程序</div>
      <div class="modal-body">
        <div style="margin:16px auto;width:180px;height:180px;background:#f0f0f0;border-radius:12px;display:flex;align-items:center;justify-content:center;border:2px dashed var(--border);">
          <div style="text-align:center;color:var(--text-muted);font-size:12px;">
            <div style="font-size:40px;margin-bottom:8px;">📱</div>
            <div>微信小程序码</div>
            <div style="font-size:10px;margin-top:4px;">（替换为实际小程序码图片）</div>
          </div>
        </div>
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:4px;">此功能需要在微信小程序中使用</p>
        <p style="font-size:12px;color:var(--text-muted);">打开微信 → 搜索「云雪CS助手」或扫码进入</p>
      </div>
      <div class="modal-footer" style="justify-content:center;">
        <button class="btn btn-sm" onclick="App.closeMiniProgramModal()">知道了</button>
      </div>
    </div>
  </div><script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
